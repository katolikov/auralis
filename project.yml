name: Auralis
options:
  bundleIdPrefix: app.auralis
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: "YES"
    ENABLE_HARDENED_RUNTIME: "YES"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    DEAD_CODE_STRIPPING: "YES"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    COMBINE_HIDPI_IMAGES: "YES"
    MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
    MTL_FAST_MATH: "YES"
targets:
  Auralis:
    type: application
    platform: macOS
    sources:
      - path: Auralis
        excludes:
          - "Resources/Info.plist"
          - "Resources/Auralis.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.auralis.Auralis
        PRODUCT_NAME: Auralis
        INFOPLIST_FILE: Auralis/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Auralis/Resources/Auralis.entitlements
        ENABLE_PREVIEWS: "YES"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
  AuralisTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AuralisTests
    dependencies:
      - target: Auralis
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Auralis.app/Contents/MacOS/Auralis"
        PRODUCT_BUNDLE_IDENTIFIER: app.auralis.Auralis.tests
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  Auralis:
    build:
      targets:
        Auralis: all
        AuralisTests: [test]
    test:
      targets:
        - AuralisTests
      gatherCoverageData: false
